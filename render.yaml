services:
  - type: web
    name: fairshare-backend
    env: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: "<RENDER_INTERNAL_CONNECTION_STRING>"
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: fairshare-frontend
    env: node
    plan: free
    region: oregon
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://fairshare-backend.onrender.com/api

# NOTE: Database creation removed because your Render account already has
# an active free-tier database. After the blueprint deploys, open the
# backend service on Render and set the `DATABASE_URL` env var to the
# Internal Connection String of your existing Postgres (recommended).
