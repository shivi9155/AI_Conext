services:
  - type: web
    name: fairshare-backend
    env: node
    plan: starter
    region: oregon
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fairshare-lite-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: fairshare-frontend
    env: node
    plan: starter
    region: oregon
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: fairshare-backend
          property: url
          relativeUrlPath: /api

databases:
  - name: fairshare-lite-db
    plan: starter
    region: oregon
